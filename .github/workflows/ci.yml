name: NyayaAI CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@nyayaai/shared

      - name: Generate Prisma client
        run: npm run generate --workspace=@nyayaai/database

      - name: Build API
        run: npm run build --workspace=@nyayaai/api

      - name: Build Web
        run: npm run build --workspace=@nyayaai/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

  docker:
    runs-on: ubuntu-latest
    needs: lint-and-build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: false
          tags: nyayaai/api:latest

      - name: Build Web Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          push: false
          tags: nyayaai/web:latest
